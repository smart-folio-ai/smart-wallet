name: Cloudflare Pages CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 3

  deploy-preview:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: Validate Cloudflare secrets
        run: |
          test -n "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          test -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          test -n "${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}"

      - name: Deploy Preview to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: npx wrangler@3 pages deploy dist --project-name="$CLOUDFLARE_PAGES_PROJECT_NAME" --branch="preview-pr-${{ github.event.pull_request.number }}"

  deploy-production:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist

      - name: Validate Cloudflare secrets
        run: |
          test -n "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          test -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          test -n "${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}"

      - name: Deploy Production to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: npx wrangler@3 pages deploy dist --project-name="$CLOUDFLARE_PAGES_PROJECT_NAME" --branch=main
